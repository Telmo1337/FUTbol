# Cloudflare Workers config. Local dev needs only the [[d1_databases]] block.
# Before deploying, replace database_id and set the secret below (see README).
name = "futbol-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Non-secret vars. The bot TOKEN is a SECRET — never put it here. Set it in prod with
# `wrangler secret put DISCORD_BOT_TOKEN`. Locally, everything lives in .dev.vars.
[vars]
TZ = "Europe/Lisbon"
# Comma-separated Discord user ids (strings) that may run admin commands.
ADMIN_IDS = ""
# Discord application id + public key (Developer Portal → General Information).
# The public key only verifies inbound signatures, so it's safe to commit.
DISCORD_APPLICATION_ID = ""
DISCORD_PUBLIC_KEY = ""
# Your server (guild) id — used by `npm run register` to register slash commands.
DISCORD_GUILD_ID = ""

[[d1_databases]]
binding = "DB"
database_name = "futbol-db"
# Placeholder is fine for --local. Replace with the real id (from `wrangler d1 create`)
# before `db:migrate:remote` / `deploy`.
database_id = "REPLACE_WITH_D1_ID_BEFORE_DEPLOY"
migrations_dir = "migrations"

# Runs the scheduled() handler every minute — powers the smart nudges & deadlines.
[triggers]
crons = ["* * * * *"]
