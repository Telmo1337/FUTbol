# Cloudflare Workers config. Local dev needs only the [[d1_databases]] block.
# Before deploying, replace database_id and set the secret below (see README).
name = "futbol-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
TZ = "Europe/Lisbon"
# Master switch for the ⚽ golos/assistências feature (boards, capture panel, /topmarcadores).
# "true" = on (default). Set to "false" to hide it all without a code change.
GOLOS_ENABLED = "true"
# Sub-switch for 🅰️ assistências only: "false" keeps goals but drops assists (subjective call).
ASSISTS_ENABLED = "false"
# 💶 Pagamentos: track who paid each game (the /pagamentos board + admin panel).
# Live in prod. Set to "false" to hide it all again without a code change.
PAGAMENTOS_ENABLED = "true"
# Runtime values are set with `wrangler secret put` (kept out of this public repo):
#   DISCORD_BOT_TOKEN, DISCORD_PUBLIC_KEY, ADMIN_IDS, GAME_CHANNEL_ID
# GAME_CHANNEL_ID = the channel where the Sunday auto-game is posted; unset = feature off.
# DISCORD_APPLICATION_ID / DISCORD_GUILD_ID live only in .dev.vars (the local
# `npm run register` script is the only thing that needs them).

[[d1_databases]]
binding = "DB"
database_name = "futbol-db"
# Placeholder is fine for --local. Replace with the real id (from `wrangler d1 create`)
# before `db:migrate:remote` / `deploy`.
database_id = "ab6077e4-96ad-4030-9233-0e3b6ad93231"
migrations_dir = "migrations"

# Runs the scheduled() handler every minute — powers the smart nudges & deadlines.
[triggers]
crons = ["* * * * *"]

# Workers Logs: makes today-silent failures (e.g. console.error in discord/rest.ts and
# services/tick.ts) searchable in the dashboard. Free plan: 200k events/day, 3-day retention —
# the every-minute cron uses a tiny fraction of that. Not retroactive.
[observability.logs]
enabled = true
invocation_logs = true
